<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0d1117" />
  <title>Experience — Detail</title>
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="detail-page">
  <header class="app-header" role="banner">
    <div>
      <h1>Experience App <span class="subtitle">detail</span></h1>
    </div>
    <a href="index.html" class="btn btn-secondary btn-sm">← Zpět</a>
  </header>

  <main class="page detail-layout" role="main">
    <aside class="detail-panel" aria-label="Detail experience">
      <div id="detail-header">
        <div class="skeleton" aria-hidden="true">
          <div class="skeleton-line long"></div>
          <div class="skeleton-line med"></div>
        </div>
      </div>

      <div id="detail-metrics"></div>

      <div class="stops-header">
        <h2>Zastávky</h2>
        <span id="stops-count" class="stops-count"></span>
      </div>
      <div id="stops-list" class="stops-list" aria-live="polite"></div>

      <div class="detail-footer">
        <button id="copy-json-btn" type="button" class="btn btn-secondary btn-sm">Kopírovat JSON</button>
        <details>
          <summary>Provider calls (debug)</summary>
          <div id="provider-details-body"></div>
        </details>
      </div>
    </aside>

    <div id="map" role="region" aria-label="Mapa zastávek"></div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/map.js"></script>
  <script src="js/experience.js"></script>
</body>
</html>
